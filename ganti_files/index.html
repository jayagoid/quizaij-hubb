    * { font-family: 'Nunito', sans-serif; }
    
    /* Mario-themed background pattern */
    @keyframes scrollClouds {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }
    
    .mario-bg {
      background: linear-gradient(180deg, #4A90E2 0%, #7DC3E8 30%, #A8D86A 70%, #70A63A 100%);
      position: relative;
      overflow: hidden;
    }
    
    .mario-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(90deg, transparent, transparent 32px, rgba(255,255,255,0.1) 32px, rgba(255,255,255,0.1) 64px),
        repeating-linear-gradient(0deg, transparent, transparent 32px, rgba(255,255,255,0.05) 32px, rgba(255,255,255,0.05) 64px);
      pointer-events: none;
    }
    
    /* Brick platform style */
    .brick-platform {
      background: linear-gradient(135deg, #C9382C 0%, #8B0000 50%, #C9382C 100%);
      border: 3px solid #6B0000;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 4px 0 #6B0000;
    }
    
    /* Question card with brick texture */
    .question-card-mario {
      background: linear-gradient(135deg, #FFFACD 0%, #F0E68C 100%);
      border: 4px solid #DAA520;
      box-shadow: 0 8px 0 #B8860B, 0 12px 20px rgba(0,0,0,0.2);
    }
    
    /* Green pipe style buttons */
    .pipe-button {
      background: linear-gradient(135deg, #00AA00 0%, #008800 50%, #00AA00 100%);
      border: 3px solid #004400;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 4px 0 #004400;
      color: white;
      font-weight: bold;
      transition: all 0.1s ease;
    }
    
    .pipe-button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 6px 0 #004400;
    }
    
    .pipe-button:active:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), 0 2px 0 #004400;
    }
    
    /* Gold coin animation */
    @keyframes coinFlip {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
    }
    
    .coin {
      animation: coinFlip 0.6s infinite;
    }
    
    /* Jump animation */
    @keyframes marioJump {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    
    .animate-mario-jump {
      animation: marioJump 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-shake { animation: shake 0.5s ease-out; }
    .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
    
    .option-btn {
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    
    .option-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    
    .progress-bar {
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%);
    }
    
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti 1s ease-out forwards;
      border-radius: 50%;
    }
  </style>

    let currentQuestion = 0;
    let score = 0;
    let userAnswers = [];

    function startQuiz() {
      currentQuestion = 0;
      score = 0;
      userAnswers = [];
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('answers-screen').classList.add('hidden');
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-counter').textContent = `Soal ${currentQuestion + 1} dari 10`;
      document.getElementById('score-display').textContent = `Skor: ${score}`;
      document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / 10) * 100}%`;
      document.getElementById('question-emoji').textContent = q.emoji;
      document.getElementById('question-text').textContent = q.question;
      
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn bg-blue-200 hover:bg-blue-300 text-gray-900 font-bold py-4 px-6 rounded-xl text-left border-2 border-blue-500 animate-slide-in';
        btn.style.animationDelay = `${index * 0.1}s`;
        btn.innerHTML = `<span class="inline-block w-8 h-8 bg-yellow-300 rounded-full text-center leading-8 mr-3 font-bold text-red-700 border-2 border-red-700">${String.fromCharCode(65 + index)}</span>${option}`;
        btn.onclick = () => selectAnswer(index);
        optionsContainer.appendChild(btn);
      });
      
      document.getElementById('feedback').classList.add('hidden');
      
      const questionCard = document.getElementById('question-card');
      questionCard.classList.remove('animate-fade-in');
      void questionCard.offsetWidth;
      questionCard.classList.add('animate-fade-in');
    }

    function selectAnswer(index) {
      const q = questions[currentQuestion];
      const isCorrect = index === q.correct;
      
      userAnswers.push({
        question: q.question,
        userAnswer: q.options[index],
        correctAnswer: q.options[q.correct],
        isCorrect: isCorrect
      });
      
      if (isCorrect) {
        score++;
        document.getElementById('score-display').textContent = `Skor: ${score}`;
      }
      
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) {
          btn.classList.remove('bg-blue-200', 'hover:bg-blue-300');
          btn.classList.add('bg-green-300', 'border-green-600', 'text-green-900');
        } else if (i === index && !isCorrect) {
          btn.classList.remove('bg-blue-200', 'hover:bg-blue-300');
          btn.classList.add('bg-red-300', 'border-red-600', 'text-red-900', 'animate-shake');
        }
      });
      
      const feedback = document.getElementById('feedback');
      const feedbackText = document.getElementById('feedback-text');
      feedback.classList.remove('hidden');
      
      if (isCorrect) {
        feedbackText.innerHTML = '<span class="text-green-700 text-lg font-bold">✅ Benar! Hebat!</span>';
      } else {
        feedbackText.innerHTML = `<span class="text-red-700 font-bold">❌ Salah!</span> <span class="text-gray-900 font-bold">Jawaban yang benar: ${q.options[q.correct]}</span>`;
      }
      
      if (currentQuestion === questions.length - 1) {
        document.getElementById('next-btn').textContent = 'Lihat Hasil 🏆';
      }
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      
      const percentage = (score / 10) * 100;
      document.getElementById('final-score').textContent = `${score}/10`;
      
      let emoji, title, message;
      if (percentage === 100) {
        emoji = '👑';
        title = 'JUARA!';
        message = 'Sempurna! Kamu adalah Master Jaringan! Luar biasa luar biasa!';
        createConfetti();
      } else if (percentage >= 80) {
        emoji = '🌟';
        title = 'LUAR BIASA!';
        message = 'Pengetahuanmu luar biasa! Kamu hampir sempurna!';
        createConfetti();
      } else if (percentage >= 60) {
        emoji = '👍';
        title = 'BAGUS!';
        message = 'Hasil yang cukup bagus! Terus belajar untuk meningkatkan pengetahuanmu!';
      } else if (percentage >= 40) {
        emoji = '💪';
        title = 'SEMANGAT!';
        message = 'Masih ada ruang untuk berkembang. Jangan menyerah dan terus belajar!';
      } else {
        emoji = '📚';
        title = 'TERUS SEMANGAT!';
        message = 'Setiap ahli dulunya juga pemula. Coba lagi dan asah kemampuanmu!';
      }
      
      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-message').textContent = message;
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#f59e0b', '#10b981', '#6366f1', '#ec4899', '#8b5cf6'];
      
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = `${Math.random() * 100}%`;
        confetti.style.top = `${Math.random() * 100}%`;
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = `${Math.random() * 0.5}s`;
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        container.appendChild(confetti);
      }
    }

    function showAnswers() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('answers-screen').classList.remove('hidden');
      
      const answersList = document.getElementById('answers-list');
      answersList.innerHTML = '';
      
      userAnswers.forEach((answer, index) => {
        const div = document.createElement('div');
        div.className = `p-4 rounded-xl ${answer.isCorrect ? 'bg-green-300 border-l-4 border-green-700' : 'bg-red-300 border-l-4 border-red-700'}`;
        div.innerHTML = `
          <p class="font-bold text-gray-900 mb-2">${index + 1}. ${answer.question}</p>
          <p class="text-sm ${answer.isCorrect ? 'text-green-900 font-bold' : 'text-red-900 font-bold'}">
            Jawabanmu: ${answer.userAnswer} ${answer.isCorrect ? '✅' : '❌'}
          </p>
          ${!answer.isCorrect ? `<p class="text-sm text-green-900 font-bold">Jawaban benar: ${answer.correctAnswer}</p>` : ''}
        `;
        answersList.appendChild(div);
      });
    }

    function restartQuiz() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('answers-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    // Element SDK Integration
    async function onConfigChange(config) {
      const title = config.quiz_title || defaultConfig.quiz_title;
      const buttonText = config.start_button_text || defaultConfig.start_button_text;
      const bgColor = config.background_color || defaultConfig.background_color;
      const surfaceColor = config.surface_color || defaultConfig.surface_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
      const secondaryColor = config.secondary_action_color || defaultConfig.secondary_action_color;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;
      
      document.getElementById('quiz-title').textContent = title;
      document.getElementById('start-btn').innerHTML = `🚀 ${buttonText}`;
      
      document.getElementById('app').style.background = `linear-gradient(135deg, ${bgColor} 0%, ${primaryColor}88 100%)`;
      
      document.querySelectorAll('.bg-white, [class*="bg-white"]').forEach(el => {
        if (el.classList.contains('rounded-3xl') || el.classList.contains('rounded-2xl')) {
          el.style.backgroundColor = surfaceColor;
        }
      });
      
      document.body.style.fontFamily = `${fontFamily}, sans-serif`;
      document.getElementById('quiz-title').style.fontSize = `${fontSize * 2.5}px`;
      document.getElementById('question-text').style.fontSize = `${fontSize * 1.25}px`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => { config.surface_color = value; window.elementSdk.setConfig({ surface_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => { config.primary_action_color = value; window.elementSdk.setConfig({ primary_action_color: value }); }
          },
          {
            get: () => config.secondary_action_color || defaultConfig.secondary_action_color,
            set: (value) => { config.secondary_action_color = value; window.elementSdk.setConfig({ secondary_action_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['quiz_title', config.quiz_title || defaultConfig.quiz_title],
        ['start_button_text', config.start_button_text || defaultConfig.start_button_text]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
